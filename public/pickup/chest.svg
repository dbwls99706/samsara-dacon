<?xml version="1.0" encoding="UTF-8"?>
<!-- 보물상자 — 갈색 + 황금 잠금 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" shape-rendering="crispEdges" width="20" height="20">
  <defs><style>.br{fill:#7c4a17}.dbr{fill:#3a200a}.y{fill:#ffd700}.dy{fill:#b88a00}.b{fill:#1a1a1a}</style></defs>
  <!-- 뚜껑 -->
  <rect class="br" x="3" y="4" width="14" height="4"/>
  <rect class="dbr" x="3" y="7" width="14" height="1"/>
  <rect class="y" x="3" y="4" width="14" height="1"/>
  <!-- 본체 -->
  <rect class="br" x="2" y="9" width="16" height="8"/>
  <rect class="dbr" x="2" y="16" width="16" height="1"/>
  <!-- 황금 띠 -->
  <rect class="y" x="2" y="9" width="16" height="1"/>
  <rect class="y" x="2" y="13" width="16" height="1"/>
  <rect class="y" x="2" y="17" width="16" height="1"/>
  <!-- 잠금 -->
  <rect class="y" x="9" y="6" width="2" height="2"/>
  <rect class="y" x="8" y="8" width="4" height="4"/>
  <rect class="b" x="9" y="9" width="2" height="3"/>
  <rect class="dy" x="11" y="10" width="1" height="2"/>
</svg>
