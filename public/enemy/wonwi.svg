<?xml version="1.0" encoding="UTF-8"?>
<!-- 원귀 (별자리 영혼) — 흩어진 7별 + 한 맺힌 푸른 안개 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" shape-rendering="crispEdges" width="24" height="24">
  <defs><style>
    .c{fill:#05d9e8}.dc{fill:#0a8a96}.b{fill:#0a0510}.w{fill:#fafafa}.p{fill:#b14aff}.dp{fill:#5a1a8a}.y{fill:#fde68a}
  </style></defs>
  <!-- 안개 베이스 (보라) -->
  <rect class="dp" x="5" y="6" width="14" height="2"/>
  <rect class="dp" x="3" y="8" width="18" height="3"/>
  <rect class="dp" x="2" y="11" width="20" height="3"/>
  <rect class="dp" x="3" y="14" width="18" height="3"/>
  <rect class="dp" x="5" y="17" width="14" height="2"/>
  <!-- 안개 그라디언트 (밝은 보라) -->
  <rect class="p" x="5" y="9" width="14" height="2"/>
  <rect class="p" x="5" y="13" width="14" height="2"/>
  <!-- 별자리 7별 (북두칠성 모티브) -->
  <rect class="w" x="5" y="7" width="2" height="2"/>
  <rect class="w" x="9" y="9" width="2" height="2"/>
  <rect class="w" x="14" y="8" width="2" height="2"/>
  <rect class="y" x="13" y="13" width="2" height="2"/>
  <rect class="w" x="17" y="11" width="2" height="2"/>
  <rect class="y" x="8" y="15" width="2" height="2"/>
  <rect class="w" x="16" y="16" width="2" height="2"/>
  <!-- 별자리 잇는 선 -->
  <rect class="c" x="6" y="8" width="3" height="1"/>
  <rect class="c" x="11" y="9" width="3" height="1"/>
  <rect class="c" x="15" y="11" width="3" height="2"/>
  <rect class="c" x="14" y="14" width="3" height="2"/>
  <rect class="c" x="10" y="16" width="6" height="1"/>
  <!-- 우는 큰 눈 (흐르는 빛) -->
  <rect class="b" x="9" y="11" width="3" height="2"/>
  <rect class="b" x="14" y="11" width="3" height="2"/>
  <rect class="c" x="9" y="13" width="1" height="3"/>
  <rect class="c" x="15" y="13" width="1" height="3"/>
  <!-- 흐르는 머리카락 -->
  <rect class="dc" x="2" y="13" width="1" height="6"/>
  <rect class="dc" x="21" y="13" width="1" height="6"/>
  <rect class="dc" x="3" y="19" width="2" height="3"/>
  <rect class="dc" x="19" y="19" width="2" height="3"/>
</svg>
