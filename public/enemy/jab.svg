<?xml version="1.0" encoding="UTF-8"?>
<!-- 잡귀 (운석 조각) — 떠도는 작은 영혼 운석 + 푸른 빛 잔재 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" shape-rendering="crispEdges" width="24" height="24">
  <defs><style>
    .r{fill:#3a2a4a}.dr{fill:#1a1426}.b{fill:#0a0510}.g{fill:#7080a0}.c{fill:#05d9e8}.w{fill:#cdd6e0}.p{fill:#b14aff}
  </style></defs>
  <!-- 운석 본체 (보라/회색 8각) -->
  <rect class="r" x="8" y="3" width="8" height="2"/>
  <rect class="r" x="6" y="5" width="12" height="2"/>
  <rect class="r" x="4" y="7" width="16" height="3"/>
  <rect class="r" x="3" y="10" width="18" height="4"/>
  <rect class="r" x="4" y="14" width="16" height="3"/>
  <rect class="r" x="6" y="17" width="12" height="2"/>
  <rect class="r" x="8" y="19" width="8" height="2"/>
  <!-- 표면 균열 (어둠) -->
  <rect class="dr" x="9" y="8" width="2" height="6"/>
  <rect class="dr" x="14" y="10" width="3" height="2"/>
  <rect class="dr" x="6" y="13" width="3" height="2"/>
  <!-- 영혼의 눈 (시안 빛) -->
  <rect class="c" x="7" y="9" width="3" height="3"/>
  <rect class="c" x="14" y="9" width="3" height="3"/>
  <rect class="b" x="8" y="10" width="1" height="1"/>
  <rect class="b" x="15" y="10" width="1" height="1"/>
  <!-- 입 -->
  <rect class="b" x="9" y="14" width="6" height="1"/>
  <rect class="p" x="10" y="15" width="4" height="1"/>
  <!-- 우주먼지 잔재 (좌우) -->
  <rect class="c" x="0" y="11" width="2" height="1"/>
  <rect class="c" x="22" y="11" width="2" height="1"/>
  <rect class="p" x="1" y="13" width="1" height="1"/>
  <rect class="p" x="22" y="13" width="1" height="1"/>
  <!-- 빛 궤적 -->
  <rect class="w" x="7" y="5" width="2" height="1"/>
  <rect class="w" x="15" y="6" width="1" height="1"/>
</svg>
