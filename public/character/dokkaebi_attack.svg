<?xml version="1.0" encoding="UTF-8"?>
<!-- SAMSARA · 도깨비 공격 (방망이 휘두름 + 황금 눈) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges" width="32" height="32">
  <defs><style>
    .g{fill:#16a085}.dg{fill:#0d6e5b}.r{fill:#e11d48}.b{fill:#1a1a1a}.y{fill:#fde68a}.w{fill:#fafafa}.br{fill:#7c4a17}.e{fill:#ffd700}
  </style></defs>
  <rect class="b" x="6" y="3" width="2" height="2"/>
  <rect class="b" x="7" y="5" width="2" height="2"/>
  <rect class="b" x="23" y="3" width="2" height="2"/>
  <rect class="b" x="22" y="5" width="2" height="2"/>
  <rect class="g" x="8" y="5" width="16" height="2"/>
  <rect class="g" x="7" y="7" width="18" height="2"/>
  <rect class="g" x="6" y="9" width="20" height="3"/>
  <rect class="g" x="6" y="12" width="20" height="3"/>
  <rect class="g" x="7" y="15" width="18" height="2"/>
  <rect class="g" x="9" y="17" width="14" height="1"/>
  <rect class="dg" x="6" y="15" width="20" height="1"/>
  <rect class="dg" x="9" y="11" width="14" height="1"/>
  <!-- 황금 분노 눈 -->
  <rect class="e" x="10" y="10" width="3" height="2"/>
  <rect class="e" x="19" y="10" width="3" height="2"/>
  <rect class="b" x="11" y="11" width="1" height="1"/>
  <rect class="b" x="20" y="11" width="1" height="1"/>
  <!-- 입 벌림 + 송곳니 -->
  <rect class="b" x="12" y="14" width="8" height="2"/>
  <rect class="w" x="12" y="14" width="1" height="2"/>
  <rect class="w" x="14" y="14" width="1" height="1"/>
  <rect class="w" x="17" y="14" width="1" height="1"/>
  <rect class="w" x="19" y="14" width="1" height="2"/>
  <rect class="r" x="14" y="15" width="4" height="1"/>
  <rect class="g" x="10" y="18" width="12" height="6"/>
  <rect class="dg" x="10" y="22" width="12" height="2"/>
  <!-- 방망이 가로로 휘두름 (큰 사이즈) -->
  <rect class="br" x="20" y="14" width="9" height="2"/>
  <rect class="br" x="22" y="12" width="6" height="6"/>
  <rect class="b" x="24" y="14" width="1" height="1"/>
  <rect class="b" x="25" y="16" width="1" height="1"/>
  <!-- 충격선 (속도) -->
  <rect class="e" x="20" y="11" width="2" height="1"/>
  <rect class="e" x="20" y="17" width="2" height="1"/>
  <!-- 다리 (땅 디딤) -->
  <rect class="g" x="11" y="24" width="3" height="4"/>
  <rect class="g" x="18" y="24" width="3" height="4"/>
  <rect class="b" x="11" y="28" width="3" height="1"/>
  <rect class="b" x="18" y="28" width="3" height="1"/>
</svg>
