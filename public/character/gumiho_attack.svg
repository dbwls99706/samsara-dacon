<?xml version="1.0" encoding="UTF-8"?>
<!-- 구미호 공격 (꼬리 부채 펼침 + 황금 눈 + 마법진 발동) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges" width="32" height="32">
  <defs><style>
    .w{fill:#f5f5f5}.dw{fill:#d0d0d0}.b{fill:#1a1a1a}.p{fill:#d300c5}.dp{fill:#7e22ce}.r{fill:#e11d48}.y{fill:#fde68a}.e{fill:#ffd700}
  </style></defs>
  <rect class="w" x="9" y="3" width="3" height="3"/>
  <rect class="w" x="20" y="3" width="3" height="3"/>
  <rect class="p" x="10" y="4" width="1" height="2"/>
  <rect class="p" x="21" y="4" width="1" height="2"/>
  <rect class="w" x="8" y="6" width="16" height="2"/>
  <rect class="w" x="7" y="8" width="18" height="2"/>
  <rect class="w" x="7" y="10" width="18" height="3"/>
  <rect class="w" x="8" y="13" width="16" height="2"/>
  <rect class="w" x="11" y="15" width="10" height="2"/>
  <rect class="dw" x="11" y="17" width="10" height="1"/>
  <!-- 입 벌림 + 송곳니 -->
  <rect class="b" x="13" y="15" width="6" height="2"/>
  <rect class="w" x="13" y="15" width="1" height="2"/>
  <rect class="w" x="18" y="15" width="1" height="2"/>
  <rect class="r" x="14" y="16" width="4" height="1"/>
  <!-- 황금 분노 눈 + 광휘 -->
  <rect class="e" x="10" y="11" width="3" height="2"/>
  <rect class="e" x="19" y="11" width="3" height="2"/>
  <rect class="b" x="11" y="11" width="1" height="1"/>
  <rect class="b" x="20" y="11" width="1" height="1"/>
  <rect class="r" x="15" y="14" width="2" height="1"/>
  <rect class="w" x="10" y="18" width="12" height="3"/>
  <!-- 9 꼬리 (부채 펼침 — 위/옆/아래) -->
  <rect class="w" x="2" y="11" width="7" height="2"/>
  <rect class="w" x="1" y="14" width="7" height="2"/>
  <rect class="w" x="0" y="17" width="8" height="2"/>
  <rect class="w" x="1" y="20" width="7" height="2"/>
  <rect class="w" x="2" y="22" width="6" height="2"/>
  <rect class="dp" x="2" y="12" width="2" height="1"/>
  <rect class="dp" x="2" y="15" width="2" height="1"/>
  <rect class="dp" x="2" y="18" width="2" height="1"/>
  <rect class="dp" x="2" y="21" width="2" height="1"/>
  <rect class="dp" x="2" y="23" width="2" height="1"/>
  <!-- 다리 -->
  <rect class="w" x="11" y="21" width="2" height="3"/>
  <rect class="w" x="19" y="21" width="2" height="3"/>
  <rect class="b" x="11" y="24" width="2" height="1"/>
  <rect class="b" x="19" y="24" width="2" height="1"/>
  <!-- 마법진 발동 (황금 빛) -->
  <rect class="e" x="14" y="20" width="4" height="1"/>
  <rect class="e" x="15" y="21" width="2" height="1"/>
  <rect class="e" x="13" y="22" width="6" height="1"/>
</svg>
