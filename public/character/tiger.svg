<?xml version="1.0" encoding="UTF-8"?>
<!--
  SAMSARA · 윤회 — 한국 호랑이 (32×32 도트)
  팔레트: 주황 #f59e0b / 어두운 주황 #c2410c / 크림 #fde6c2 / 흰 #ffffff / 검정 #1a1a1a / 단청 빨강 #e11d48 / 눈 하이라이트 #fde68a
  Aseprite 호환 (각 픽셀 = 1×1 rect, viewBox 32×32, image-rendering:pixelated 권장)
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges" width="32" height="32">
  <defs>
    <style>
      .o{fill:#f59e0b}
      .d{fill:#c2410c}
      .p{fill:#fde6c2}
      .w{fill:#ffffff}
      .b{fill:#1a1a1a}
      .r{fill:#e11d48}
      .y{fill:#fde68a}
    </style>
  </defs>

  <!-- 귀 (left/right) -->
  <rect class="o" x="6"  y="3" width="3" height="1"/>
  <rect class="o" x="5"  y="4" width="5" height="1"/>
  <rect class="o" x="5"  y="5" width="5" height="1"/>
  <rect class="b" x="6"  y="5" width="3" height="1"/>
  <rect class="o" x="5"  y="6" width="2" height="1"/>
  <rect class="o" x="8"  y="6" width="2" height="1"/>
  <rect class="b" x="7"  y="6" width="1" height="1"/>

  <rect class="o" x="23" y="3" width="3" height="1"/>
  <rect class="o" x="22" y="4" width="5" height="1"/>
  <rect class="o" x="22" y="5" width="5" height="1"/>
  <rect class="b" x="23" y="5" width="3" height="1"/>
  <rect class="o" x="22" y="6" width="2" height="1"/>
  <rect class="o" x="25" y="6" width="2" height="1"/>
  <rect class="b" x="24" y="6" width="1" height="1"/>

  <!-- 머리 윤곽 (오렌지) -->
  <rect class="o" x="7"  y="6" width="1" height="1"/>
  <rect class="o" x="9"  y="6" width="1" height="1"/>
  <rect class="o" x="22" y="6" width="1" height="1"/>
  <rect class="o" x="24" y="6" width="0" height="1"/>
  <rect class="o" x="6"  y="7" width="20" height="1"/>
  <rect class="o" x="5"  y="8" width="22" height="1"/>
  <rect class="o" x="4"  y="9" width="24" height="1"/>
  <rect class="o" x="4"  y="10" width="24" height="1"/>
  <rect class="o" x="4"  y="11" width="24" height="1"/>
  <rect class="o" x="4"  y="12" width="24" height="1"/>
  <rect class="o" x="4"  y="13" width="24" height="1"/>
  <rect class="o" x="4"  y="14" width="24" height="1"/>
  <rect class="o" x="5"  y="15" width="22" height="1"/>
  <rect class="o" x="5"  y="16" width="22" height="1"/>
  <rect class="o" x="6"  y="17" width="20" height="1"/>
  <rect class="o" x="7"  y="18" width="18" height="1"/>
  <rect class="o" x="9"  y="19" width="14" height="1"/>

  <!-- 호랑이 검은 줄무늬 (이마) -->
  <rect class="b" x="9"  y="7" width="1" height="2"/>
  <rect class="b" x="13" y="7" width="1" height="2"/>
  <rect class="b" x="15" y="6" width="2" height="3"/>
  <rect class="b" x="18" y="7" width="1" height="2"/>
  <rect class="b" x="22" y="7" width="1" height="2"/>

  <!-- 머리 옆 줄무늬 -->
  <rect class="b" x="4"  y="11" width="2" height="1"/>
  <rect class="b" x="4"  y="13" width="2" height="1"/>
  <rect class="b" x="26" y="11" width="2" height="1"/>
  <rect class="b" x="26" y="13" width="2" height="1"/>

  <!-- 얼굴 크림 영역 -->
  <rect class="p" x="9"  y="10" width="14" height="1"/>
  <rect class="p" x="8"  y="11" width="16" height="1"/>
  <rect class="p" x="8"  y="12" width="16" height="1"/>
  <rect class="p" x="8"  y="13" width="16" height="1"/>
  <rect class="p" x="9"  y="14" width="14" height="1"/>
  <rect class="p" x="10" y="15" width="12" height="1"/>
  <rect class="p" x="11" y="16" width="10" height="1"/>

  <!-- 눈 (검정 + 노랑 하이라이트) -->
  <rect class="b" x="10" y="11" width="3" height="2"/>
  <rect class="y" x="11" y="11" width="1" height="1"/>
  <rect class="b" x="19" y="11" width="3" height="2"/>
  <rect class="y" x="20" y="11" width="1" height="1"/>

  <!-- 코 (단청 빨강) + 입 -->
  <rect class="r" x="15" y="13" width="2" height="1"/>
  <rect class="b" x="15" y="14" width="2" height="1"/>
  <rect class="b" x="14" y="15" width="1" height="1"/>
  <rect class="b" x="17" y="15" width="1" height="1"/>
  <rect class="w" x="13" y="15" width="1" height="1"/>
  <rect class="w" x="18" y="15" width="1" height="1"/>

  <!-- 수염 (어두운 주황) -->
  <rect class="d" x="6"  y="13" width="3" height="1"/>
  <rect class="d" x="6"  y="15" width="3" height="1"/>
  <rect class="d" x="23" y="13" width="3" height="1"/>
  <rect class="d" x="23" y="15" width="3" height="1"/>

  <!-- 턱 줄무늬 -->
  <rect class="b" x="13" y="18" width="1" height="1"/>
  <rect class="b" x="18" y="18" width="1" height="1"/>

  <!-- 몸통 (앞다리 살짝 보이는 윤곽) -->
  <rect class="o" x="11" y="20" width="10" height="1"/>
  <rect class="o" x="10" y="21" width="12" height="1"/>
  <rect class="o" x="10" y="22" width="12" height="1"/>
  <rect class="o" x="10" y="23" width="12" height="1"/>
  <rect class="o" x="10" y="24" width="12" height="1"/>
  <rect class="o" x="10" y="25" width="12" height="1"/>
  <rect class="o" x="10" y="26" width="12" height="1"/>
  <rect class="o" x="11" y="27" width="10" height="1"/>

  <!-- 몸통 줄무늬 -->
  <rect class="b" x="11" y="22" width="1" height="2"/>
  <rect class="b" x="14" y="22" width="1" height="2"/>
  <rect class="b" x="17" y="22" width="1" height="2"/>
  <rect class="b" x="20" y="22" width="1" height="2"/>
  <rect class="b" x="13" y="25" width="1" height="2"/>
  <rect class="b" x="18" y="25" width="1" height="2"/>

  <!-- 배 크림 -->
  <rect class="p" x="14" y="24" width="4" height="2"/>

  <!-- 발 (앞발 2개) -->
  <rect class="o" x="10" y="28" width="3" height="1"/>
  <rect class="o" x="19" y="28" width="3" height="1"/>
  <rect class="b" x="10" y="29" width="3" height="1"/>
  <rect class="b" x="19" y="29" width="3" height="1"/>
</svg>
