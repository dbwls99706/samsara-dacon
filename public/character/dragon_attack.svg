<?xml version="1.0" encoding="UTF-8"?>
<!-- 용 공격 (입 벌림 + 화염 토출 + 황금 눈) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges" width="32" height="32">
  <defs><style>
    .c{fill:#05d9e8}.dc{fill:#0891a8}.y{fill:#ffd700}.dy{fill:#b88a00}.b{fill:#1a1a1a}.r{fill:#e11d48}.w{fill:#fafafa}.f{fill:#ff6f00}.f2{fill:#ff2a6d}
  </style></defs>
  <rect class="y" x="11" y="2" width="2" height="3"/>
  <rect class="y" x="19" y="2" width="2" height="3"/>
  <rect class="dy" x="11" y="4" width="2" height="1"/>
  <rect class="dy" x="19" y="4" width="2" height="1"/>
  <rect class="c" x="9" y="5" width="14" height="2"/>
  <rect class="c" x="8" y="7" width="16" height="2"/>
  <rect class="c" x="7" y="9" width="18" height="3"/>
  <rect class="c" x="7" y="12" width="18" height="3"/>
  <!-- 갈기 (분노 — 펼침) -->
  <rect class="y" x="6" y="5" width="2" height="3"/>
  <rect class="y" x="24" y="5" width="2" height="3"/>
  <rect class="y" x="4" y="8" width="3" height="4"/>
  <rect class="y" x="25" y="8" width="3" height="4"/>
  <rect class="dy" x="4" y="11" width="3" height="1"/>
  <rect class="dy" x="25" y="11" width="3" height="1"/>
  <!-- 황금 분노 눈 -->
  <rect class="y" x="10" y="10" width="3" height="2"/>
  <rect class="y" x="19" y="10" width="3" height="2"/>
  <rect class="b" x="11" y="11" width="1" height="1"/>
  <rect class="b" x="20" y="11" width="1" height="1"/>
  <rect class="w" x="11" y="10" width="1" height="1"/>
  <rect class="w" x="20" y="10" width="1" height="1"/>
  <!-- 콧구멍 (커짐) -->
  <rect class="b" x="13" y="13" width="2" height="1"/>
  <rect class="b" x="17" y="13" width="2" height="1"/>
  <!-- 입 크게 벌림 + 송곳니 + 화염 -->
  <rect class="b" x="11" y="14" width="10" height="1"/>
  <rect class="b" x="10" y="15" width="12" height="2"/>
  <rect class="b" x="11" y="17" width="10" height="1"/>
  <rect class="w" x="11" y="15" width="1" height="2"/>
  <rect class="w" x="13" y="15" width="1" height="1"/>
  <rect class="w" x="18" y="15" width="1" height="1"/>
  <rect class="w" x="20" y="15" width="1" height="2"/>
  <!-- 화염 토출 (오른쪽으로) -->
  <rect class="f2" x="22" y="15" width="3" height="2"/>
  <rect class="f" x="25" y="14" width="3" height="3"/>
  <rect class="y" x="28" y="15" width="3" height="1"/>
  <rect class="r" x="22" y="16" width="2" height="1"/>
  <!-- 몸통 -->
  <rect class="c" x="11" y="18" width="10" height="3"/>
  <rect class="c" x="9" y="21" width="13" height="2"/>
  <rect class="c" x="7" y="23" width="14" height="2"/>
  <rect class="dc" x="11" y="20" width="10" height="1"/>
  <rect class="dc" x="9" y="23" width="13" height="1"/>
  <!-- 꼬리 -->
  <rect class="c" x="5" y="25" width="14" height="2"/>
  <rect class="c" x="3" y="27" width="10" height="2"/>
  <rect class="dc" x="3" y="28" width="10" height="1"/>
  <!-- 발톱 (세움) -->
  <rect class="y" x="10" y="21" width="1" height="3"/>
  <rect class="y" x="20" y="21" width="1" height="3"/>
</svg>
