<?xml version="1.0" encoding="UTF-8"?>
<!-- SAMSARA · 구미호 (32×32) - 흰 여우 + 9 꼬리 + 청보랏빛 광택 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges" width="32" height="32">
  <defs><style>
    .w{fill:#f5f5f5}.dw{fill:#d0d0d0}.b{fill:#1a1a1a}.p{fill:#d300c5}.dp{fill:#7e22ce}.r{fill:#e11d48}.y{fill:#fde68a}
  </style></defs>
  <!-- 귀 -->
  <rect class="w" x="9" y="3" width="3" height="3"/>
  <rect class="w" x="20" y="3" width="3" height="3"/>
  <rect class="p" x="10" y="4" width="1" height="2"/>
  <rect class="p" x="21" y="4" width="1" height="2"/>
  <!-- 머리 (흰 여우) -->
  <rect class="w" x="8" y="6" width="16" height="2"/>
  <rect class="w" x="7" y="8" width="18" height="2"/>
  <rect class="w" x="7" y="10" width="18" height="3"/>
  <rect class="w" x="8" y="13" width="16" height="2"/>
  <!-- 주둥이 -->
  <rect class="w" x="11" y="15" width="10" height="2"/>
  <rect class="dw" x="11" y="17" width="10" height="1"/>
  <rect class="b" x="14" y="16" width="4" height="1"/>
  <!-- 눈 (보라) -->
  <rect class="p" x="10" y="11" width="3" height="2"/>
  <rect class="p" x="19" y="11" width="3" height="2"/>
  <rect class="b" x="11" y="11" width="1" height="1"/>
  <rect class="b" x="20" y="11" width="1" height="1"/>
  <!-- 코 -->
  <rect class="r" x="15" y="14" width="2" height="1"/>
  <!-- 몸통 (작게) -->
  <rect class="w" x="10" y="18" width="12" height="3"/>
  <!-- 9 꼬리 (대표 3개) - 보라빛 그라디언트 효과 -->
  <rect class="w" x="2" y="14" width="6" height="2"/>
  <rect class="w" x="1" y="16" width="6" height="2"/>
  <rect class="w" x="2" y="18" width="5" height="2"/>
  <rect class="dp" x="1" y="17" width="2" height="1"/>
  <rect class="dp" x="3" y="14" width="2" height="1"/>
  <rect class="dp" x="3" y="19" width="2" height="1"/>
  <!-- 추가 꼬리 -->
  <rect class="w" x="3" y="20" width="5" height="1"/>
  <rect class="w" x="4" y="21" width="4" height="1"/>
  <rect class="dp" x="5" y="21" width="1" height="1"/>
  <!-- 다리 -->
  <rect class="w" x="11" y="21" width="2" height="3"/>
  <rect class="w" x="19" y="21" width="2" height="3"/>
  <rect class="b" x="11" y="24" width="2" height="1"/>
  <rect class="b" x="19" y="24" width="2" height="1"/>
  <!-- 마법진 광택 -->
  <rect class="y" x="15" y="20" width="2" height="1"/>
</svg>
