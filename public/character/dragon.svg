<?xml version="1.0" encoding="UTF-8"?>
<!-- SAMSARA · 용 (32×32) - 동양 청룡 + 황금 갈기 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges" width="32" height="32">
  <defs><style>
    .c{fill:#05d9e8}.dc{fill:#0891a8}.y{fill:#ffd700}.dy{fill:#b88a00}.b{fill:#1a1a1a}.r{fill:#e11d48}.w{fill:#fafafa}
  </style></defs>
  <!-- 뿔 (위) -->
  <rect class="y" x="11" y="2" width="2" height="3"/>
  <rect class="y" x="19" y="2" width="2" height="3"/>
  <rect class="dy" x="11" y="4" width="2" height="1"/>
  <rect class="dy" x="19" y="4" width="2" height="1"/>
  <!-- 머리 (청록 비늘) -->
  <rect class="c" x="9" y="5" width="14" height="2"/>
  <rect class="c" x="8" y="7" width="16" height="2"/>
  <rect class="c" x="7" y="9" width="18" height="3"/>
  <rect class="c" x="7" y="12" width="18" height="3"/>
  <rect class="c" x="8" y="15" width="16" height="2"/>
  <!-- 비늘 그늘 -->
  <rect class="dc" x="7" y="11" width="18" height="1"/>
  <rect class="dc" x="8" y="14" width="16" height="1"/>
  <!-- 갈기 (황금) -->
  <rect class="y" x="6" y="6" width="2" height="2"/>
  <rect class="y" x="24" y="6" width="2" height="2"/>
  <rect class="y" x="5" y="9" width="2" height="3"/>
  <rect class="y" x="25" y="9" width="2" height="3"/>
  <rect class="dy" x="5" y="12" width="2" height="1"/>
  <rect class="dy" x="25" y="12" width="2" height="1"/>
  <!-- 눈 (빨강 빛) -->
  <rect class="r" x="10" y="10" width="3" height="2"/>
  <rect class="r" x="19" y="10" width="3" height="2"/>
  <rect class="b" x="11" y="11" width="1" height="1"/>
  <rect class="b" x="20" y="11" width="1" height="1"/>
  <rect class="w" x="11" y="10" width="1" height="1"/>
  <rect class="w" x="20" y="10" width="1" height="1"/>
  <!-- 콧구멍 -->
  <rect class="b" x="14" y="13" width="1" height="1"/>
  <rect class="b" x="17" y="13" width="1" height="1"/>
  <!-- 입 + 송곳니 -->
  <rect class="b" x="13" y="15" width="6" height="1"/>
  <rect class="w" x="14" y="16" width="1" height="1"/>
  <rect class="w" x="17" y="16" width="1" height="1"/>
  <!-- 몸통 (휘어진) -->
  <rect class="c" x="11" y="17" width="10" height="3"/>
  <rect class="c" x="9" y="20" width="13" height="2"/>
  <rect class="c" x="7" y="22" width="14" height="2"/>
  <!-- 비늘 줄 -->
  <rect class="dc" x="11" y="19" width="10" height="1"/>
  <rect class="dc" x="9" y="22" width="13" height="1"/>
  <!-- 꼬리 -->
  <rect class="c" x="5" y="24" width="14" height="2"/>
  <rect class="c" x="3" y="26" width="10" height="2"/>
  <rect class="dc" x="3" y="27" width="10" height="1"/>
  <!-- 발톱 -->
  <rect class="y" x="10" y="20" width="1" height="2"/>
  <rect class="y" x="20" y="20" width="1" height="2"/>
</svg>
