<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0a0a1a"/>
    </radialGradient>
    <linearGradient id="title" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff2a6d"/>
      <stop offset="100%" stop-color="#05d9e8"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- 단청 회전 원 -->
  <g opacity="0.18" transform="translate(600 315)">
    <circle r="120" fill="none" stroke="#ff2a6d" stroke-width="2"/>
    <circle r="180" fill="none" stroke="#05d9e8" stroke-width="2"/>
    <circle r="240" fill="none" stroke="#ffd700" stroke-width="2"/>
    <circle r="300" fill="none" stroke="#00ff88" stroke-width="2"/>
  </g>

  <!-- 한자 떠다니는 배경 -->
  <g font-family="serif" font-size="80" fill="#9966cc" opacity="0.08">
    <text x="100" y="180">輪</text>
    <text x="1020" y="160">廻</text>
    <text x="80" y="500">夢</text>
    <text x="1040" y="540">虎</text>
    <text x="500" y="120">時</text>
    <text x="700" y="560">空</text>
  </g>

  <!-- 제목 -->
  <text x="600" y="280" text-anchor="middle" font-family="monospace" font-size="120" font-weight="bold" fill="url(#title)">SAMSARA</text>
  <text x="600" y="340" text-anchor="middle" font-family="monospace" font-size="36" fill="#8888aa">윤회 / 輪廻</text>

  <!-- 한 줄 카피 -->
  <text x="600" y="420" text-anchor="middle" font-family="monospace" font-size="32" fill="#f0f0ff">30초마다 새 운명을 짠다</text>
  <text x="600" y="460" text-anchor="middle" font-family="monospace" font-size="20" fill="#8888aa">Every 30 seconds, a new fate.</text>

  <!-- 6태그 -->
  <text x="600" y="540" text-anchor="middle" font-family="serif" font-size="40" fill="#ffd700">🔥 ❄️ 💰 ⏱️ 🌀 🪞</text>

  <!-- URL -->
  <text x="600" y="600" text-anchor="middle" font-family="monospace" font-size="18" fill="#8888aa">samsara-dacon.vercel.app</text>
</svg>
