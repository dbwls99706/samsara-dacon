name: CI

# SAMSARA — DACON 월간 해커톤 출품작 자동 검증.
# fresh clone 후 npm ci → build → vitest → verify-all(preview + e2e + impression + lighthouse).
# 1차 60% 동료 개발자가 fork 또는 PR 보내면 green badge 가 신뢰 시그널.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-test-e2e:
    name: Build · Test · E2E
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies (fresh)
        run: npm ci

      - name: TypeScript strict + Vite build
        run: npm run build

      - name: Unit tests (vitest)
        run: npm test

      - name: Install Playwright browsers (chromium only — fast)
        run: npx playwright install --with-deps chromium

      - name: Browser gates (preview + e2e + impression + lighthouse)
        # verify-all 이 vite preview 를 직접 띄우고 3 게이트를 :4173 에 대고 돌린 뒤 teardown.
        # 로컬 `npm run test:all` 과 동일한 단일 진실원 — CI/로컬 검증 경로가 갈리지 않는다.
        run: node scripts/verify-all.mjs

      - name: Upload E2E screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-screenshots
          path: |
            scripts/e2e-out/
            scripts/lh-out/
          retention-days: 7

      - name: Bundle size report
        if: success()
        run: |
          echo "## Build size report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          ls -lh dist/assets/*.js dist/assets/*.css | awk '{print $5, $9}' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
