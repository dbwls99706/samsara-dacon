name: CI

# SAMSARA — DACON 월간 해커톤 출품작 자동 검증.
# fresh clone 후 npm ci → build → vitest → preview + e2e + impression 4 게이트.
# 1차 60% 동료 개발자가 fork 또는 PR 보내면 green badge 가 신뢰 시그널.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-test-e2e:
    name: Build · Test · E2E
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies (fresh)
        run: npm ci

      - name: TypeScript strict + Vite build
        run: npm run build

      - name: Unit tests (vitest)
        run: npm test

      - name: Install Playwright browsers (chromium only — fast)
        run: npx playwright install --with-deps chromium

      - name: Start preview server
        run: |
          npm run preview &
          # 서버 부팅 대기 — 최대 15초
          for i in {1..15}; do
            if curl -sf http://localhost:4173/ > /dev/null; then
              echo "Preview server ready after ${i}s"
              break
            fi
            sleep 1
          done

      - name: E2E smoke (boot + console + canvas)
        run: node scripts/e2e-smoke.mjs http://localhost:4173/

      - name: Impression bot (judge first-3min simulation)
        run: node scripts/e2e-impression.mjs http://localhost:4173/

      - name: Upload E2E screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-screenshots
          path: scripts/e2e-out/
          retention-days: 7

      - name: Bundle size report
        if: success()
        run: |
          echo "## Build size report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          ls -lh dist/assets/*.js dist/assets/*.css | awk '{print $5, $9}' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
